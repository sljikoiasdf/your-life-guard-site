<!--
  YOUR LIFE GUARD — Carrd Embed snippet (v2)
  Paste into a Carrd EMBED element: Type: Code, Style: Inline. Publish.
  Update SITE_URL if the Pages URL changes.
-->
<script>
(function () {
  var SITE_URL = "https://sljikoiasdf.github.io/your-life-guard-site/";

  var css = document.createElement("style");
  css.textContent =
    "html,body{margin:0!important;padding:0!important;height:100%!important;overflow:hidden!important;}" +
    "#ylg-frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:block;z-index:2147483000;background:#fff;}";
  document.head.appendChild(css);

  var f = document.createElement("iframe");
  f.id = "ylg-frame";
  f.title = "Your Life Guard";
  f.setAttribute("allow", "clipboard-write");
  f.src = SITE_URL + (SITE_URL.indexOf("?") === -1 ? "?" : "&") + "_=" + Date.now();

  function mount() { (document.body || document.documentElement).appendChild(f); }
  if (document.body) mount();
  else document.addEventListener("DOMContentLoaded", mount);

  window.addEventListener("message", function (e) {
    var d = e.data;
    if (!d || d.ylg == null) return;
    if (d.ylg === "navigate" && typeof d.href === "string" &&
        /^(tel:|mailto:)/.test(d.href)) {
      window.top.location.href = d.href;
    }
  }, false);
})();
</script>
