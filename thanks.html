<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thanks — Your Life Guard</title>
<meta name="description" content="Thanks for your enquiry — Your Life Guard will be in touch within one business day.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#DE3939">
<link rel="stylesheet" href="styles.css">
<style>
  .thanks-wrap{min-height:62vh;display:grid;place-items:center;padding:var(--s-8) 0;}
  .thanks-card{max-width:560px;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);padding:var(--s-8) var(--s-7);box-shadow:var(--shadow);}
  .thanks-card .tick{width:72px;height:72px;border-radius:50%;background:color-mix(in srgb,var(--accent) 14%,transparent);color:var(--accent);display:grid;place-items:center;margin:0 auto var(--s-5);}
  .thanks-card .tick svg{width:36px;height:36px;}
  .thanks-card h1{font-size:var(--fs-h2);margin-bottom:var(--s-3);}
  .thanks-card p{color:var(--text-soft);font-size:var(--fs-lead);}
  .thanks-card .actions{display:flex;gap:var(--s-3);justify-content:center;flex-wrap:wrap;margin-top:var(--s-6);}
</style>
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a class="brand" href="index.html" aria-label="Your Life Guard home">
      <span class="ylg-mark" data-logo="light"></span>
      <span class="brand-name">Your Life <span class="accent">Guard</span></span>
    </a>
    <div class="nav-cta" style="margin-left:auto;">
      <a class="nav-phone" href="tel:1300718859">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92Z"/></svg>
        <span>1300 718 859</span>
      </a>
    </div>
  </div>
</header>

<main>
  <div class="container thanks-wrap">
    <div class="thanks-card">
      <div class="tick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
      <h1>Thanks — we'll be in touch</h1>
      <p>We've received your enquiry and one of our team will get back to you within one business day. In the meantime, you can reach us on 1300 718 859.</p>
      <div class="actions">
        <a class="btn btn-primary btn-lg" href="index.html">Back to home</a>
        <a class="btn btn-ghost btn-lg" href="tel:1300718859">Call 1300 718 859</a>
      </div>
    </div>
  </div>
</main>

<div id="ylg-footer"></div>

<script src="logos-lab.js"></script>
<script src="footer.js"></script>
<script>
  document.querySelectorAll('[data-logo]').forEach(function(el){
    if (window.LogoLab) el.innerHTML = window.LogoLab.flagShield('color');
  });
</script>
</body>
</html>
